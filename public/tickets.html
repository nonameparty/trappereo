<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; --text: #fff; --accent: #fff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:var(--text); padding:20px; }
        .container { max-width:900px; margin:0 auto; }
        
        h1 { font-size:40px; font-weight:900; margin-bottom:10px; text-transform:uppercase; letter-spacing:-1px; }
        .subtitle { color:#666; margin-bottom:30px; font-size:13px; font-weight:700; text-transform:uppercase; }
        
        .list { display:flex; flex-direction:column; gap:18px; }
        
        .ticket { 
            background:var(--card); border:1px solid #222; border-left: 8px solid #333; 
            border-radius:16px; padding:25px; display:flex; justify-content:space-between; align-items:center;
            transition: transform 0.2s;
        }
        .ticket:hover { transform: translateY(-2px); border-color: #444; }

        .tag { 
            font-size:10px; font-weight:900; padding:4px 10px; border-radius:6px; 
            display:inline-block; margin-bottom:10px; text-transform:uppercase; border: 1px solid;
        }
        
        .info h3 { font-size:24px; font-weight:900; text-transform:uppercase; line-height:1; }
        .info p { color:#777; font-size:15px; margin-top:6px; max-width: 400px; }
        
        .right-side { text-align:right; min-width:160px; }
        .price { font-size:28px; font-weight:900; display: block; margin-bottom: 15px;}
        
        /* Selettore Quantità Stile Zceed */
        .qty-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 15px;
        }
        .qty-btn {
            background: #222;
            color: #fff;
            border: 1px solid #333;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 900;
            transition: 0.2s;
        }
        .qty-btn:hover { background: #333; }
        .qty-num { font-size: 18px; font-weight: 900; min-width: 25px; text-align: center; }

        .btn { 
            background:#fff; color:#000; padding:12px 25px; border-radius:12px; 
            text-decoration:none; font-weight:900; font-size:13px; 
            display:inline-block; border: none; cursor: pointer; text-transform: uppercase;
        }
        .btn:hover { background: #eee; }
        
        .flash { color:#ff4757; font-size:12px; font-weight:800; display:block; margin-top:6px; }

        @media (max-width: 600px) {
            .ticket { flex-direction: column; align-items: flex-start; gap: 20px; }
            .right-side { text-align: left; width: 100%; }
            .qty-wrapper { justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BIGLIETTI</h1>
        <p class="subtitle">Seleziona la quantità e procedi</p>
        <div id="ticket-list" class="list">Caricamento tickets...</div>
    </div>

    <script>
        async function fetchTickets() {
            const container = document.getElementById('ticket-list');
            try {
                // Carica il JSON aggiornato dall'AI
                const r = await fetch('dati-ticket.json?v=' + Date.now());
                const data = await r.json();
                let tickets = Array.isArray(data) ? data : (data[""] || []);

                const cleanTickets = tickets
                    .filter(t => t.nome && t.nome.trim() !== "")
                    .filter((v, i, a) => a.findIndex(t => t.nome === v.nome) === i);

                if (cleanTickets.length === 0) {
                    container.innerHTML = "<p style='color:#444'>Nessun biglietto disponibile.</p>";
                    return;
                }

                container.innerHTML = cleanTickets.map((t, i) => {
                    const c = t.colore || '#333';
                    const tagHtml = (t.tag && t.tag.trim() !== "" && t.tag.toLowerCase() !== 'off') 
                        ? `<span class="tag" style="color:${c}; border-color:${c}">${t.tag}</span>` 
                        : '';

                    return `
                    <div class="ticket" style="border-left-color: ${c}">
                        <div class="info">
                            ${tagHtml}
                            <h3>${t.nome}</h3>
                            <p>${t.descrizione || ''}</p>
                            ${t.flashSaleAttivo === "TRUE" || t.flashSaleAttivo === true ? `<span class="flash">${t.flashSaleMsg}</span>` : ''}
                        </div>
                        <div class="right-side">
                            <span class="price">${t.prezzo},00 €</span>
                            <div class="qty-wrapper">
                                <button class="qty-btn" onclick="updateQty(${i}, -1)">-</button>
                                <span class="qty-num" id="qty-${i}">1</span>
                                <button class="qty-btn" onclick="updateQty(${i}, 1)">+</button>
                            </div>
                            <button class="btn" onclick="checkout(${i}, '${t.nome}', ${t.prezzo})">Acquista</button>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) { 
                container.innerHTML = '<p>Errore di sincronizzazione dati...</p>'; 
            }
        }

        // Gestione Quantità
        window.updateQty = (id, val) => {
            const el = document.getElementById(`qty-${id}`);
            let current = parseInt(el.innerText);
            el.innerText = Math.max(1, current + val);
        };

        // Invio a n8n per Generazione PDF
        window.checkout = async (id, nome, prezzo) => {
            const qta = document.getElementById(`qty-${id}`).innerText;
            const totale = qta * prezzo;
            
            // Messaggio di conferma (puoi sostituirlo con un redirect a Stripe)
            const conferma = confirm(`Confermi l'acquisto di ${qta}x ${nome} per ${totale}€?`);
            
            if(conferma) {
                try {
                    // Sostituisci l'URL qui sotto con il tuo Webhook di n8n
                    const webhookUrl = 'https://n8n.tuodominio.com/webhook/acquisto'; 
                    
                    /* scommenta questo blocco per attivare l'invio reale
                    await fetch(webhookUrl, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            event: "acquisto_sito",
                            ticket: nome,
                            quantita: qta,
                            totale: totale,
                            cliente: "Robert Constantin Cioroaba"
                        })
                    });
                    alert("Richiesta inviata! Riceverai il ticket a breve.");
                    */
                    alert("Simulazione: n8n sta generando il tuo PDF...");
                } catch (e) {
                    alert("Errore nell'invio della richiesta.");
                }
            }
        };

        fetchTickets();
    </script>
</body>
</html>
