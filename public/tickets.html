<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tickets | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; --sub: #888; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:#fff; padding:20px; overflow-x: hidden; }
        
        .container { max-width:850px; margin:0 auto; padding-bottom: 140px; }
        
        h1 { font-size:36px; font-weight:900; text-transform:uppercase; letter-spacing:-1.5px; margin-bottom:8px; }
        .subtitle { color:#555; margin-bottom:25px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
        
        .list { display:flex; flex-direction:column; gap:15px; }
        
        .ticket { 
            background:var(--card); border:1px solid #222; border-left: 6px solid #333; 
            border-radius:16px; padding:22px; min-height: 110px;
            display:flex; justify-content:space-between; align-items:center;
        }

        .info h3 { font-size:20px; font-weight:900; text-transform:uppercase; letter-spacing:-0.5px; }
        .info p { color:#666; font-size:13px; margin-top:5px; line-height: 1.3; }
        
        .right-side { text-align:right; display:flex; align-items:center; gap:18px; }
        .price-tag { font-size:18px; font-weight:900; color:#fff; }

        /* Qty Control più grande per touch iPhone */
        .qty-ctrl { 
            display:flex; align-items:center; gap:12px; 
            background:#1a1a1a; padding:8px 15px; border-radius:10px;
            border: 1px solid #333;
        }
        .qty-btn { background:none; color:#fff; border:none; width:25px; height:25px; font-size:22px; cursor:pointer; font-weight:900; display:flex; align-items:center; justify-content:center; }
        .qty-num { font-size:16px; font-weight:900; min-width:20px; text-align:center; }

        /* Checkout Bar - Larga e Visibile */
        .checkout-bar {
            position: fixed; bottom: 30px; right: 20px;
            background: #fff; color: #000;
            padding: 15px 25px; border-radius: 50px;
            display: none; align-items: center; gap: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            z-index: 999;
        }
        .total-box { line-height: 1; }
        .total-box span { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #888; }
        .total-box h4 { font-size: 22px; font-weight: 900; margin-top: 2px; }
        
        .checkout-btn { 
            background: #000; color: #fff; padding: 12px 25px; 
            border-radius: 30px; font-size: 13px; font-weight: 900; 
            text-transform: uppercase; border: none; cursor: pointer;
        }

        @media (min-width: 1024px) {
            h1 { font-size: 45px; }
            .ticket { padding: 30px; }
            .info h3 { font-size: 24px; }
            .checkout-bar { bottom: 40px; right: 40px; transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BIGLIETTI</h1>
        <p class="subtitle">Scegli la quantità</p>
        <div id="ticket-list" class="list">Caricamento in corso...</div>
    </div>

    <div id="summary" class="checkout-bar">
        <div class="total-box">
            <span>Totale</span>
            <h4 id="grand-total">0€</h4>
        </div>
        <button class="checkout-btn" onclick="goToN8n()">Checkout</button>
    </div>

    <script>
        let cart = {};

        async function fetchTickets() {
            const container = document.getElementById('ticket-list');
            try {
                const r = await fetch('dati-ticket.json?v=' + Date.now());
                const data = await r.json();
                let tickets = Array.isArray(data) ? data : (data[""] || []);

                const cleanTickets = tickets
                    .filter(t => t.nome && t.nome.trim() !== "")
                    .filter((v, i, a) => a.findIndex(t => t.nome === v.nome) === i);

                container.innerHTML = cleanTickets.map((t, i) => {
                    cart[i] = { nome: t.nome, prezzo: parseInt(t.prezzo), qta: 0 };
                    return `
                    <div class="ticket" style="border-left-color: ${t.colore || '#333'}">
                        <div class="info">
                            <h3>${t.nome}</h3>
                            <p>${t.descrizione || ''}</p>
                        </div>
                        <div class="right-side">
                            <span class="price-tag">${t.prezzo}€</span>
                            <div class="qty-ctrl">
                                <button class="qty-btn" onclick="update(${i}, -1)">-</button>
                                <span class="qty-num" id="q-${i}">0</span>
                                <button class="qty-btn" onclick="update(${i}, 1)">+</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) { container.innerHTML = "Errore dati n8n."; }
        }

        window.update = (id, delta) => {
            cart[id].qta = Math.max(0, cart[id].qta + delta);
            document.getElementById(`q-${id}`).innerText = cart[id].qta;
            
            let total = 0, items = 0;
            for (let k in cart) { total += cart[k].qta * cart[k].prezzo; items += cart[k].qta; }
            
            document.getElementById('grand-total').innerText = total + '€';
            document.getElementById('summary').style.display = items > 0 ? 'flex' : 'none';
        };

        function goToN8n() {
            const scelti = Object.values(cart).filter(i => i.qta > 0);
            alert("Checkout: " + JSON.stringify(scelti));
            // Qui colleghi il tuo webhook
        }

        fetchTickets();
    </script>
</body>
</html>
