<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tickets | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; --sub: #888; --accent: #7866df; --panna: #ddd; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:#fff; padding:20px; }
        
        .container { max-width:800px; margin:0 auto; padding-bottom: 140px; }
        h1 { font-size:34px; font-weight:900; text-transform:uppercase; letter-spacing:-1.5px; margin-bottom:8px; }
        .subtitle { color:#555; margin-bottom:25px; font-size:11px; font-weight:700; text-transform:uppercase; }
        
        .list { display:flex; flex-direction:column; gap:12px; }
        .ticket { 
            background:var(--card); border:1px solid #222; border-left: 5px solid #333; 
            border-radius:14px; padding:20px; min-height: 100px;
            display:flex; justify-content:space-between; align-items:center;
        }
        .info h3 { font-size:19px; font-weight:900; text-transform:uppercase; }
        .info p { color:#666; font-size:12px; margin-top:4px; }
        
        .final-disclaimer { color:#555; font-size:12px; margin-top:20px; font-weight: 500; }

        .qty-ctrl { display:flex; align-items:center; gap:12px; background:#1a1a1a; padding:8px 15px; border-radius:10px; border: 1px solid #333; }
        .qty-btn { background:none; color:#fff; border:none; font-size:22px; cursor:pointer; font-weight:900; }
        .qty-num { font-size:16px; font-weight:900; min-width:20px; text-align:center; }

        /* Checkout Bar */
        .checkout-bar {
            position: fixed; bottom: 25px; right: 20px; background: #fff; color: #000;
            padding: 12px 20px; border-radius: 40px; display: none; align-items: center; gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 999;
        }
        .checkout-btn { background: var(--accent); color: #fff; padding: 10px 22px; border-radius: 30px; font-size: 12px; font-weight: 900; text-transform: uppercase; border: none; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 600px; margin: 0 auto; padding-bottom: 50px; }
        .guest-section { background: #111; border: 1px solid #222; border-radius: 15px; padding: 22px; margin-bottom: 15px; }
        .guest-type-title { font-size: 14px; font-weight: 900; text-transform: uppercase; color: var(--accent); margin-bottom: 15px; display: block; }
        
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; font-size: 10px; text-transform: uppercase; color: #888; margin-bottom: 6px; }
        .input-group input { width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 14px; border-radius: 10px; color: #fff; font-size: 16px; outline: none; }
        .input-group input:focus { border-color: var(--accent); }

        .drink-info { color: var(--panna); font-size: 13px; margin-top: 8px; font-weight: 500; min-height: 18px; }

        .buy-now-btn { width: 100%; padding: 22px; background: #fff; color: #000; font-weight: 900; border-radius: 15px; border: none; font-size: 16px; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container" id="main-page">
        <h1>BIGLIETTI</h1>
        <p class="subtitle">Scegli la quantità</p>
        <div id="ticket-list" class="list">Caricamento...</div>
        <div id="disclaimer-area"></div>
    </div>

    <div id="summary" class="checkout-bar">
        <div class="total-box"><span>Totale</span><h4 id="grand-total">0€</h4></div>
        <button class="checkout-btn" onclick="openNominativi()">Checkout</button>
    </div>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <a href="javascript:void(0)" onclick="closeModal()" style="color:#555; text-decoration:none; font-size:11px; font-weight:800; text-transform:uppercase; display:block; margin: 20px 0;">← Indietro</a>
            <h1>DETTAGLI</h1>
            <p class="subtitle">Inserisci i dati obbligatori</p>
            
            <form id="checkout-form">
                <div id="guests-container"></div>
                
                <div class="guest-section">
                    <span class="guest-type-title">Contatto Ordine</span>
                    <div class="input-group"><label>Email</label><input type="email" id="main-email" required placeholder="Inserisci Email"></div>
                    <div class="input-group"><label>Telefono</label><input type="tel" id="main-phone" required placeholder="Inserisci Cellulare"></div>
                </div>

                <button type="submit" class="buy-now-btn">Acquista Ora</button>
            </form>
        </div>
    </div>

    <script>
        let cart = {};
        let currentTotal = 0;

        async function fetchTickets() {
            const container = document.getElementById('ticket-list');
            try {
                const r = await fetch('dati-ticket.json?v=' + Date.now());
                const data = await r.json();
                let tickets = Array.isArray(data) ? data : (data[""] || []);
                container.innerHTML = tickets.filter(t => t.nome).map((t, i) => {
                    cart[i] = { nome: t.nome, prezzo: parseInt(t.prezzo), qta: 0, desc: t.descrizione };
                    return `
                    <div class="ticket" style="border-left-color: ${t.colore || '#333'}">
                        <div class="info"><h3>${t.nome}</h3><p>${t.descrizione || ''}</p></div>
                        <div class="right-side">
                            <span style="font-weight:900; font-size:17px; margin-right:10px">${t.prezzo}€</span>
                            <div class="qty-ctrl">
                                <button class="qty-btn" onclick="update(${i}, -1)">-</button>
                                <span class="qty-num" id="q-${i}">0</span>
                                <button class="qty-btn" onclick="update(${i}, 1)">+</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
                document.getElementById('disclaimer-area').innerHTML = `<p class="final-disclaimer">*Drink alcolico se maggiorenne o analcolico se minorenne</p>`;
            } catch (e) { container.innerHTML = "Errore dati."; }
        }

        window.update = (id, delta) => {
            cart[id].qta = Math.max(0, cart[id].qta + delta);
            document.getElementById(`q-${id}`).innerText = cart[id].qta;
            let total = 0, items = 0;
            for (let k in cart) { total += cart[k].qta * cart[k].prezzo; items += cart[k].qta; }
            currentTotal = total;
            document.getElementById('grand-total').innerText = total + '€';
            document.getElementById('summary').style.display = items > 0 ? 'flex' : 'none';
        };

        window.closeModal = () => document.getElementById('checkout-modal').style.display = 'none';

        function checkAge(dobValue, index, baseDesc) {
            const drinkSpan = document.getElementById(`drink-info-${index}`);
            if(!dobValue) return;
            
            const birth = new Date(dobValue);
            const today = new Date("2026-03-28");
            let age = today.getFullYear() - birth.getFullYear();
            const m = today.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;

            // Estrai numero drink dalla descrizione (es: "2 drink" -> 2)
            const numMatch = baseDesc.match(/(\d+)\s*drink/i);
            const numDrink = numMatch ? numMatch[1] : "1";
            const tipo = age >= 18 ? "alcolici" : "analcolici";
            
            drinkSpan.innerText = `Hai ${numDrink} drink ${tipo} inclusi`;
        }

        function openNominativi() {
            const scelti = Object.values(cart).filter(i => i.qta > 0);
            const container = document.getElementById('guests-container');
            container.innerHTML = '';
            
            let count = 1;
            scelti.forEach(t => {
                for(let n = 0; n < t.qta; n++) {
                    container.innerHTML += `
                        <div class="guest-section">
                            <span class="guest-type-title">${t.nome} #${n+1}</span>
                            <div class="input-group"><label>Nome</label><input type="text" required></div>
                            <div class="input-group"><label>Cognome</label><input type="text" required></div>
                            <div class="input-group">
                                <label>Data di Nascita</label>
                                <input type="date" required onchange="checkAge(this.value, ${count}, '${t.desc}')">
                                <div class="drink-info" id="drink-info-${count}"></div>
                            </div>
                        </div>`;
                    count++;
                }
            });
            document.getElementById('checkout-modal').style.display = 'block';
        }

        fetchTickets();
    </script>
</body>
</html>
