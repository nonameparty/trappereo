<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Tickets | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2ecc71; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:#000; color:#fff; padding:40px 20px; }
        .ticket { background:#111; border:1px solid #222; border-radius:16px; padding:25px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; }
        .info h3 { font-size:22px; font-weight:900; text-transform:uppercase; }
        .price { font-size:26px; font-weight:900; }
        .btn { background:#fff; color:#000; padding:12px 25px; border-radius:8px; text-decoration:none; font-weight:900; }
        .tag { color:var(--accent); font-size:10px; font-weight:900; border:1px solid var(--accent); padding:2px 8px; border-radius:4px; display:inline-block; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container" style="max-width:800px; margin:0 auto;">
        <h1 style="margin-bottom:30px; font-size:40px; font-weight:900;">Biglietti</h1>
        <div id="display">Caricamento...</div>
    </div>
    <script>
        async function load() {
            try {
                const r = await fetch('dati-ticket.json?v=' + Date.now());
                const raw = await r.json();
                
                // IL TRUCCO FINALE: trova la lista dei ticket ovunque sia nascosta
                let list = [];
                if (Array.isArray(raw)) { list = raw; }
                else if (raw.empty && Array.isArray(raw.empty)) { list = raw.empty; }
                else if (raw.data && Array.isArray(raw.data)) { list = raw.data; }
                else { list = [raw]; }

                document.getElementById('display').innerHTML = list.map(t => `
                    <div class="ticket">
                        <div class="info">
                            <span class="tag">${t.tag || 'DISPONIBILE'}</span>
                            <h3>${t.nome || 'Ticket'}</h3>
                            <p style="color:#666; font-size:14px;">${t.descrizione || ''}</p>
                        </div>
                        <div style="text-align:right">
                            <span class="price">${t.prezzo || '0'},00 €</span><br><br>
                            <a href="#" class="btn">AGGIUNGI</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('display').innerHTML = "Errore dati."; }
        }
        load();
    </script>
</body>
</html>
