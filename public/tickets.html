<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TICKETS | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #8a2be2; --dark: #0e0e0e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: white; text-align: center; }
        .navbar { padding: 20px 5%; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-weight: 900; letter-spacing: 2px; text-decoration: none; color: white; }
        
        .container { padding: 40px 5%; max-width: 600px; margin: 0 auto; }
        #event-title { font-size: 32px; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; color: white; }
        
        .card { 
            background: var(--dark); 
            border: 2px solid #222; 
            padding: 40px; 
            border-radius: 30px; 
            transition: 0.3s;
            position: relative;
        }
        .card.premium { border-color: var(--purple); box-shadow: 0 0 30px rgba(138,43,226,0.2); }
        
        .tag { background: var(--purple); color: white; padding: 5px 15px; border-radius: 50px; font-size: 10px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: inline-block; }
        .price { font-size: 60px; font-weight: 900; margin: 20px 0; display: block; }
        .desc { color: #888; font-size: 15px; margin-bottom: 25px; line-height: 1.5; }
        .info { font-size: 12px; color: #555; margin-bottom: 20px; text-transform: uppercase; font-weight: 700; }

        .btn { 
            display: block; 
            background: white; 
            color: black; 
            padding: 20px; 
            border-radius: 15px; 
            text-decoration: none; 
            font-weight: 900; 
            text-transform: uppercase; 
            transition: 0.3s;
        }
        .btn:hover { background: var(--purple); color: white; }
        .btn.disabled { background: #222; color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="nav-logo">TRAPPEREO</a>
        <a href="/" style="color:#555; text-decoration:none; font-weight:700;">← HOME</a>
    </nav>

    <div class="container">
        <h1 id="event-title">CARICAMENTO...</h1>
        <div id="ticket-box">
            </div>
    </div>

    <script>
        async function loadTicket() {
            try {
                const res = await fetch('dati-ticket.json?v=' + Math.random());
                if (!res.ok) throw new Error("File non trovato");
                const data = await res.json();
                
                document.getElementById('event-title').innerText = "DISPONIBILITÀ ATTUALE";
                
                const box = document.getElementById('ticket-box');
                box.innerHTML = `
                    <div class="card ${data.premium ? 'premium' : ''}">
                        <span class="tag">${data.tag}</span>
                        <h2 style="font-size:28px; font-weight:900;">${data.nome}</h2>
                        <span class="price">${data.prezzo}€</span>
                        <p class="desc">${data.descrizione}</p>
                        <p class="info">Posti rimasti: ${data.postiDisponibili}</p>
                        <a href="#" class="btn ${data.active ? '' : 'disabled'}">
                            ${data.active ? 'ACQUISTA ORA' : 'NON DISPONIBILE'}
                        </a>
                    </div>
                `;
            } catch (err) {
                document.getElementById('event-title').innerText = "ERRORE SINCRO";
                console.error(err);
            }
        }
        loadTicket();
    </script>
</body>
</html>
