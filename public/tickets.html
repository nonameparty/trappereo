<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2ecc71; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:#000; color:#fff; padding:40px 20px; }
        .container { max-width:800px; margin:0 auto; }
        .list { display:flex; flex-direction:column; gap:15px; }
        .ticket { background:#111; border:1px solid #222; border-radius:16px; padding:25px; display:flex; justify-content:space-between; align-items:center; }
        .info h3 { font-size:20px; font-weight:800; text-transform:uppercase; margin-bottom:5px; }
        .price { font-size:26px; font-weight:900; }
        .btn { background:#fff; color:#000; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:900; }
        .tag { color:var(--accent); font-size:10px; font-weight:900; border:1px solid var(--accent); padding:2px 8px; border-radius:4px; display:inline-block; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="margin-bottom:30px">Biglietti</h1>
        <div id="display" class="list">In attesa dei dati...</div>
    </div>
    <script>
        async function load() {
            try {
                const r = await fetch('dati-ticket.json?v=' + Date.now());
                const data = await r.json();
                
                // GESTIONE DATI FLESSIBILE: 
                // Cerca i ticket sia se sono una lista diretta, sia se n8n li ha messi in "empty"
                const tickets = Array.isArray(data) ? data : (data.empty || [data]);

                document.getElementById('display').innerHTML = tickets.map(t => `
                    <div class="ticket">
                        <div class="info">
                            <span class="tag">${t.tag || 'DISPONIBILE'}</span>
                            <h3>${t.nome || 'Ticket'}</h3>
                            <p style="color:#666; font-size:14px;">${t.descrizione || ''}</p>
                        </div>
                        <div style="text-align:right">
                            <span class="price">${t.prezzo || '0'},00 €</span><br><br>
                            <a href="#" class="btn">AGGIUNGI</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('display').innerHTML = "Sincronizzazione in corso... ricarica tra 5 secondi.";
            }
        }
        load();
    </script>
</body>
</html>
