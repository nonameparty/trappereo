<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:#fff; padding:20px; }
        .container { max-width:900px; margin:0 auto; }
        
        h1 { font-size:40px; font-weight:900; margin-bottom:10px; text-transform:uppercase; }
        .subtitle { color:#666; margin-bottom:40px; font-size:14px; font-weight:700; text-transform:uppercase; }
        
        .list { display:flex; flex-direction:column; gap:20px; }
        
        /* Struttura base del Ticket */
        .ticket { 
            background:var(--card); 
            border:1px solid #222; 
            border-left: 8px solid #333; /* Più spessa per vedersi su mobile */
            border-radius:16px; 
            padding:30px; 
            display:flex; 
            justify-content:space-between; 
            align-items:center;
        }

        .info h3 { font-size:26px; font-weight:900; text-transform:uppercase; }
        .info p { color:#888; font-size:16px; line-height:1.4; margin-top:5px; }
        
        /* Tag dinamico: appare solo se c'è testo */
        .tag { 
            font-size:11px; font-weight:900; padding:4px 10px; border-radius:6px; 
            display:inline-block; margin-bottom:10px; text-transform:uppercase;
            border: 1px solid; background: rgba(255,255,255,0.05);
        }
        
        .right-side { text-align:right; min-width:160px; }
        .price { font-size:32px; font-weight:900; display:block; }
        .btn { 
            background:#fff; color:#000; padding:12px 25px; border-radius:10px; 
            text-decoration:none; font-weight:900; font-size:14px; margin-top:15px; display:inline-block;
        }
        .flash { color:#ff4757; font-size:13px; font-weight:800; display:block; margin-top:8px; }

        /* ADATTAMENTO PER MOBILE (IPHONE) */
        @media (max-width: 600px) {
            h1 { font-size: 28px; }
            .ticket { padding: 18px; border-left-width: 10px; } /* Ancora più evidenza al colore */
            .info h3 { font-size: 18px; }
            .info p { font-size: 13px; }
            .price { font-size: 20px; }
            .btn { padding: 8px 16px; font-size: 12px; }
            .right-side { min-width: 100px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Biglietti</h1>
        <p class="subtitle">Seleziona e vai al pagamento</p>
        <div id="ticket-list" class="list">Caricamento...</div>
    </div>

    <script>
        async function fetchTickets() {
            const container = document.getElementById('ticket-list');
            try {
                const r = await fetch('dati-ticket.json?v=' + Date.now());
                const data = await r.json();
                let tickets = Array.isArray(data) ? data : (data[""] || data.empty || []);

                container.innerHTML = tickets.map(t => {
                    const c = t.colore || '#333';
                    // Nasconde il tag se la colonna è vuota o 'off'
                    const tagHtml = (t.tag && t.tag.toLowerCase() !== 'off') 
                        ? `<span class="tag" style="color:${c}; border-color:${c}">${t.tag}</span>` 
                        : '';

                    return `
                    <div class="ticket" style="border-left-color: ${c}">
                        <div class="info">
                            ${tagHtml}
                            <h3>${t.nome}</h3>
                            <p>${t.descrizione || ''}</p>
                            ${t.flashSaleAttivo ? `<span class="flash">${t.flashSaleMsg}</span>` : ''}
                        </div>
                        <div class="right-side">
                            <span class="price">${t.prezzo},00 €</span>
                            <a href="#" class="btn">AGGIUNGI</a>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) { container.innerHTML = '<p>Sincronizzazione...</p>'; }
        }
        fetchTickets();
    </script>
</body>
</html>
