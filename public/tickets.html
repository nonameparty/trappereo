<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tickets | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:#fff; padding:15px; overflow-x: hidden; }
        .container { max-width:800px; margin:0 auto; padding-bottom: 120px; }
        h1 { font-size:26px; font-weight:900; text-transform:uppercase; letter-spacing:-1px; margin-bottom:5px; }
        .subtitle { color:#555; margin-bottom:20px; font-size:10px; font-weight:700; text-transform:uppercase; }
        .list { display:flex; flex-direction:column; gap:10px; }
        .ticket { background:var(--card); border:1px solid #222; border-left: 4px solid #333; border-radius:12px; padding:15px; display:flex; justify-content:space-between; align-items:center; }
        .info h3 { font-size:15px; font-weight:900; text-transform:uppercase; }
        .info p { color:#666; font-size:11px; margin-top:2px; }
        .right-side { text-align:right; display:flex; align-items:center; gap:12px; }
        .price-tag { font-size:15px; font-weight:900; color:#888; }
        .qty-ctrl { display:flex; align-items:center; gap:8px; background:#1a1a1a; padding:4px 8px; border-radius:8px; }
        .qty-btn { background:none; color:#fff; border:none; width:20px; font-size:18px; cursor:pointer; font-weight:900; }
        .qty-num { font-size:13px; font-weight:900; min-width:15px; text-align:center; }
        
        /* Riepilogo in basso a destra stile Apple */
        .summary-bar {
            position: fixed; bottom: 25px; right: 20px; background: #fff; color: #000;
            padding: 12px 20px; border-radius: 40px; display: none; align-items: center;
            gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 999;
        }
        .total-info { line-height: 1; }
        .total-info span { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #888; }
        .total-info h4 { font-size: 18px; font-weight: 900; }
        .checkout-btn { background: #000; color: #fff; padding: 10px 18px; border-radius: 30px; font-size: 11px; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; }

        @media (min-width: 1024px) {
            h1 { font-size: 38px; }
            .ticket { padding: 22px; }
            .info h3 { font-size: 20px; }
            .summary-bar { bottom: 40px; right: 40px; transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BIGLIETTI</h1>
        <p class="subtitle">Scegli la quantità</p>
        <div id="ticket-list" class="list"></div>
    </div>

    <div id="summary" class="summary-bar">
        <div class="total-info">
            <span>Totale</span>
            <h4 id="grand-total">0€</h4>
        </div>
        <button class="checkout-btn" onclick="goToN8n()">Checkout</button>
    </div>

    <script>
        let cart = {};
        async function fetchTickets() {
            const container = document.getElementById('ticket-list');
            const r = await fetch('dati-ticket.json?v=' + Date.now());
            const data = await r.json();
            let tickets = Array.isArray(data) ? data : (data[""] || []);
            container.innerHTML = tickets.filter(t => t.nome).map((t, i) => {
                cart[i] = { nome: t.nome, prezzo: parseInt(t.prezzo), qta: 0 };
                return `
                <div class="ticket" style="border-left-color: ${t.colore || '#333'}">
                    <div class="info"><h3>${t.nome}</h3><p>${t.descrizione || ''}</p></div>
                    <div class="right-side">
                        <span class="price-tag">${t.prezzo}€</span>
                        <div class="qty-ctrl">
                            <button class="qty-btn" onclick="update(${i}, -1)">-</button>
                            <span class="qty-num" id="q-${i}">0</span>
                            <button class="qty-btn" onclick="update(${i}, 1)">+</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
