<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tickets | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --sub: #888; --accent: #7866df; --panna: #ddd; --error: #ff4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:#fff; padding:20px; }
        
        .container { max-width:800px; margin:0 auto; padding-bottom: 140px; }
        h1 { font-size:34px; font-weight:900; text-transform:uppercase; letter-spacing:-1.5px; margin-bottom:8px; }
        .subtitle { color:#555; margin-bottom:25px; font-size:11px; font-weight:700; text-transform:uppercase; }
        
        .list { display:flex; flex-direction:column; gap:12px; }
        .ticket { 
            background:var(--card); border:1px solid #222; border-left: 5px solid #333; 
            border-radius:14px; padding:22px; min-height: 105px;
            display:flex; justify-content:space-between; align-items:center;
        }
        .info h3 { font-size:20px; font-weight:900; text-transform:uppercase; }
        .info p { color:#666; font-size:13px; margin-top:4px; }
        
        .final-disclaimer { color:#555; font-size:12px; margin-top:20px; font-weight: 500; }

        .qty-ctrl { display:flex; align-items:center; gap:12px; background:#1a1a1a; padding:8px 15px; border-radius:10px; border: 1px solid #333; }
        .qty-btn { background:none; color:#fff; border:none; font-size:22px; cursor:pointer; font-weight:900; }
        .qty-num { font-size:16px; font-weight:900; min-width:20px; text-align:center; }

        .checkout-bar {
            position: fixed; bottom: 25px; right: 20px; background: #fff; color: #000;
            padding: 12px 20px; border-radius: 40px; display: none; align-items: center; gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 999;
        }
        .checkout-btn { background: var(--accent); color: #fff; padding: 10px 22px; border-radius: 30px; font-size: 12px; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 600px; margin: 0 auto; padding-bottom: 50px; }
        .guest-section { background: #111; border: 1px solid #222; border-radius: 15px; padding: 22px; margin-bottom: 15px; }
        .guest-type-title { font-size: 14px; font-weight: 900; text-transform: uppercase; color: var(--accent); margin-bottom: 15px; display: block; }
        
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; font-size: 10px; text-transform: uppercase; color: #fff; margin-bottom: 6px; font-weight: 700; }
        .input-group input { width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 14px; border-radius: 10px; color: #fff; font-size: 16px; outline: none; }
        .input-group input:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .drink-info { color: var(--panna); font-size: 13px; margin-top: 8px; font-weight: 500; }
        .age-error { background: var(--error); color: #fff; padding: 12px; border-radius: 10px; font-size: 12px; font-weight: 900; margin-top: 10px; display: none; text-transform: uppercase; }

        .summary-box { background: #1a1a1a; border-radius: 15px; padding: 20px; margin: 20px 0; text-align: center; border: 1px dashed #333; }
        .summary-box p { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 800; }
        .summary-box h2 { font-size: 32px; font-weight: 900; color: #fff; }

        .buy-now-btn { width: 100%; padding: 22px; background: #fff; color: #000; font-weight: 900; border-radius: 15px; border: none; font-size: 16px; text-transform: uppercase; cursor: pointer; }
        .buy-now-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container" id="main-page">
        <h1>BIGLIETTI</h1>
        <p class="subtitle">SELEZIONA E VAI AL PAGAMENTO</p>
        <div id="ticket-list" class="list">Caricamento...</div>
        <div id="disclaimer-area"></div>
    </div>

    <div id="summary" class="checkout-bar">
        <div class="total-box"><span style="font-size:9px; font-weight:800; color:#888; text-transform:uppercase;">Totale</span><h4 id="grand-total" style="font-size:20px; font-weight:900;">0€</h4></div>
        <button class="checkout-btn" onclick="openNominativi()">Checkout</button>
    </div>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <a href="javascript:void(0)" onclick="closeModal()" style="color:#555; text-decoration:none; font-size:11px; font-weight:800; text-transform:uppercase; display:block; margin: 20px 0;">← Indietro</a>
            <h1>DETTAGLI</h1>
            <p class="subtitle">Inserisci i dati per ogni partecipante</p>
            
            <form id="checkout-form">
                <div id="guests-container"></div>
                
                <div class="guest-section">
                    <span class="guest-type-title">Contatto Ordine</span>
                    <div class="input-group"><label>Email per invio biglietti</label><input type="email" id="main-email" required placeholder="esempio@email.it"></div>
                    <div class="input-group"><label>Cellulare</label><input type="tel" id="main-phone" required placeholder="+39"></div>
                </div>

                <div class="summary-box">
                    <p>Totale Ordine</p>
                    <h2 id="final-price-display">0€</h2>
                </div>

                <button type="submit" id="final-buy-btn" class="buy-now-btn">Acquista Ora</button>
            </form>
        </div>
    </div>

    <script>
        let cart = {};
        let currentTotal = 0;
        let guestData = [];
        let redirectTimer = null;
        const { jsPDF } = window.jspdf;

        async function fetchTickets() {
            const container = document.getElementById('ticket-list');
            try {
                const r = await fetch('dati-ticket.json?v=' + Date.now());
                const data = await r.json();
                let tickets = Array.isArray(data) ? data : (data[""] || []);
                const uniqueTickets = tickets.filter((v, i, a) => v.nome && a.findIndex(t => t.nome === v.nome) === i);

                container.innerHTML = uniqueTickets.map((t, i) => {
                    cart[i] = { nome: t.nome, prezzo: parseInt(t.prezzo), qta: 0, desc: t.descrizione };
                    return `
                    <div class="ticket" style="border-left-color: ${t.colore || '#333'}">
                        <div class="info"><h3>${t.nome}</h3><p>${t.descrizione || ''}</p></div>
                        <div class="right-side">
                            <span style="font-weight:900; font-size:18px; margin-right:10px">${t.prezzo}€</span>
                            <div class="qty-ctrl">
                                <button class="qty-btn" onclick="update(${i}, -1)">-</button>
                                <span class="qty-num" id="q-${i}">0</span>
                                <button class="qty-btn" onclick="update(${i}, 1)">+</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
                document.getElementById('disclaimer-area').innerHTML = `<p class="final-disclaimer">*Drink alcolico se maggiorenne o analcolico se minorenne</p>`;
            } catch (e) { container.innerHTML = "Errore caricamento dati."; }
        }

        window.update = (id, delta) => {
            cart[id].qta = Math.max(0, cart[id].qta + delta);
            document.getElementById(`q-${id}`).innerText = cart[id].qta;
            let total = 0, items = 0;
            for (let k in cart) { total += cart[k].qta * cart[k].prezzo; items += cart[k].qta; }
            currentTotal = total;
            document.getElementById('grand-total').innerText = total + '€';
            document.getElementById('summary').style.display = items > 0 ? 'flex' : 'none';
        };

        window.closeModal = () => {
            document.getElementById('checkout-modal').style.display = 'none';
            clearTimeout(redirectTimer);
        };

        function calculateFinalTotal() {
            let finalPrice = 0;
            let anyValid = false;
            
            guestData.forEach((guest, i) => {
                const dobInput = document.getElementById(`dob-${i}`);
                if (dobInput && dobInput.value) {
                    const birth = new Date(dobInput.value);
                    const today = new Date("2026-03-28");
                    let age = today.getFullYear() - birth.getFullYear();
                    if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;
                    
                    const isBlocked = age < 16;
                    document.getElementById(`name-${i}`).disabled = isBlocked;
                    document.getElementById(`surname-${i}`).disabled = isBlocked;
                    document.getElementById(`age-error-${i}`).style.display = isBlocked ? 'block' : 'none';
                    document.getElementById(`drink-info-${i}`).style.display = isBlocked ? 'none' : 'block';

                    if (!isBlocked) {
                        finalPrice += guest.prezzo;
                        anyValid = true;
                        const numMatch = guest.desc.match(/(\d+)\s*drink/i);
                        const numDrink = numMatch ? numMatch[1] : "1";
                        document.getElementById(`drink-info-${i}`).innerText = `Hai ${numDrink} drink ${age >= 18 ? 'alcolici' : 'analcolici'} inclusi`;
                    }
                }
            });

            document.getElementById('main-email').disabled = !anyValid;
            document.getElementById('main-phone').disabled = !anyValid;
            document.getElementById('final-price-display').innerText = finalPrice + '€';
            document.getElementById('final-buy-btn').disabled = !anyValid || finalPrice === 0;

            if (!anyValid) {
                if (!redirectTimer) redirectTimer = setTimeout(() => { window.location.reload(); }, 60000);
            } else {
                clearTimeout(redirectTimer);
                redirectTimer = null;
            }
        }

        function generaPDF(e) {
            e.preventDefault();
            const doc = new jsPDF();
            const email = document.getElementById('main-email').value;
            const phone = document.getElementById('main-phone').value;
            let y = 20;

            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("TRAPPEREO - BIGLIETTO UFFICIALE", 20, y);
            
            y += 15;
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text(`Ordine effettuato da: ${email} | Tel: ${phone}`, 20, y);
            
            y += 10;
            doc.line(20, y, 190, y);
            
            guestData.forEach((guest, i) => {
                const nome = document.getElementById(`name-${i}`).value;
                const cognome = document.getElementById(`surname-${i}`).value;
                const dob = document.getElementById(`dob-${i}`).value;
                
                // Genera solo se non è disabilitato (quindi ha > 16 anni)
                if (!document.getElementById(`name-${i}`).disabled && nome) {
                    y += 15;
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(14);
                    doc.text(`${guest.nomeTicket}`, 20, y);
                    
                    y += 7;
                    doc.setFontSize(12);
                    doc.setFont("helvetica", "normal");
                    doc.text(`Partecipante: ${nome} ${cognome}`, 20, y);
                    doc.text(`Nato il: ${dob}`, 20, y + 7);
                    
                    const drinkTxt = document.getElementById(`drink-info-${i}`).innerText;
                    doc.setFont("helvetica", "italic");
                    doc.text(`Incluso: ${drinkTxt}`, 20, y + 14);
                    y += 20;
                    doc.line(20, y, 100, y);
                }
            });

            y += 20;
            doc.setFont("helvetica", "bold");
            doc.setFontSize(16);
            doc.text(`TOTALE PAGATO: ${document.getElementById('final-price-display').innerText}`, 20, y);

            doc.save(`Ticket_Trappereo_${Date.now()}.pdf`);
            alert("Il tuo PDF è stato generato!");
        }

        document.getElementById('checkout-form').addEventListener('submit', generaPDF);

        function openNominativi() {
            const scelti = Object.values(cart).filter(i => i.qta > 0);
            const container = document.getElementById('guests-container');
            container.innerHTML = '';
            guestData = [];
            
            let count = 0;
            scelti.forEach(t => {
                for(let n = 0; n < t.qta; n++) {
                    guestData.push({ nomeTicket: t.nome, prezzo: t.prezzo, desc: t.desc });
                    container.innerHTML += `
                        <div class="guest-section">
                            <span class="guest-type-title">${t.nome}</span>
                            <div class="input-group"><label>Nome Partecipante</label><input type="text" id="name-${count}" required placeholder="Nome"></div>
                            <div class="input-group"><label>Cognome Partecipante</label><input type="text" id="surname-${count}" required placeholder="Cognome"></div>
                            <div class="input-group">
                                <label>Data di Nascita</label>
                                <input type="date" id="dob-${count}" required onchange="calculateFinalTotal()">
                                <div class="drink-info" id="drink-info-${count}"></div>
                                <div class="age-error" id="age-error-${count}">NON PUOI ACCEDERE AL LOCALE, L'EVENTO È +16</div>
                            </div>
                        </div>`;
                    count++;
                }
            });
            document.getElementById('final-price-display').innerText = '0€';
            document.getElementById('final-buy-btn').disabled = true;
            document.getElementById('checkout-modal').style.display = 'block';
            calculateFinalTotal();
        }

        fetchTickets();
    </script>
</body>
</html>
