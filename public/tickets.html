<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2ecc71; --card: #111; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:#000; color:#fff; padding:40px 20px; }
        .container { max-width:800px; margin:0 auto; }
        .header { margin-bottom: 30px; }
        h1 { font-size:32px; font-weight:900; margin-bottom:5px; }
        .subtitle { color:#555; font-size:11px; text-transform:uppercase; letter-spacing:1px; }
        .list { display:flex; flex-direction:column; gap:15px; }
        .ticket { background:var(--card); border:1px solid #222; border-radius:16px; padding:25px; display:flex; justify-content:space-between; align-items:center; transition: 0.3s; }
        .ticket:hover { border-color: #333; }
        .info h3 { font-size:20px; font-weight:800; text-transform:uppercase; margin-bottom:5px; }
        .tag { font-size:10px; color:var(--accent); font-weight:900; border:1px solid var(--accent); padding:2px 8px; border-radius:4px; margin-bottom:10px; display:inline-block; }
        .price { font-size:26px; font-weight:900; display:block; margin-bottom:10px; }
        .btn { background:#fff; color:#000; padding:10px 22px; border-radius:8px; text-decoration:none; font-weight:900; font-size:13px; display:inline-block; }
        .btn:hover { background: var(--accent); color: white; }
        @media (max-width:600px) { .ticket { flex-direction:column; align-items:flex-start; gap:20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Biglietti</h1>
            <p class="subtitle">Seleziona la quantità e vai al pagamento</p>
        </div>
        <div id="display" class="list">Caricamento tickets in corso...</div>
    </div>
    <script>
        async function load() {
            try {
                // Il timestamp (?v=) serve a saltare la cache di Vercel
                const r = await fetch('dati-ticket.json?v=' + Date.now());
                const data = await r.json();
                const box = document.getElementById('display');

                // Se n8n manda un oggetto con una proprietà "data", o un array diretto
                const tickets = Array.isArray(data) ? data : (data.data || [data]);

                box.innerHTML = tickets.map(t => `
                    <div class="ticket">
                        <div class="info">
                            <span class="tag">${t.tag || 'DISPONIBILE'}</span>
                            <h3>${t.nome}</h3>
                            <p style="color:#888; font-size:14px; margin-bottom:10px;">${t.descrizione}</p>
                            <small style="color:#444; font-weight:700;">DISPONIBILI: ${t.postiDisponibili || '10'}</small>
                        </div>
                        <div style="text-align:right">
                            <span class="price">${t.prezzo},00 €</span>
                            <a href="#" class="btn">AGGIUNGI</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('display').innerHTML = "<p style='color:red'>Errore sincronizzazione. Riprova tra un istante.</p>";
            }
        }
        load();
    </script>
</body>
</html>
