<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:#fff; padding:20px; }
        .container { max-width:900px; margin:0 auto; }
        h1 { font-size:40px; font-weight:900; margin-bottom:10px; text-transform:uppercase; letter-spacing:-1px; }
        .subtitle { color:#666; margin-bottom:30px; font-size:13px; font-weight:700; text-transform:uppercase; }
        .list { display:flex; flex-direction:column; gap:18px; }
        .ticket { 
            background:var(--card); border:1px solid #222; border-left: 8px solid #333; 
            border-radius:16px; padding:25px; display:flex; justify-content:space-between; align-items:center;
        }
        .tag { 
            font-size:10px; font-weight:900; padding:4px 10px; border-radius:6px; 
            display:inline-block; margin-bottom:10px; text-transform:uppercase; border: 1px solid;
        }
        .info h3 { font-size:24px; font-weight:900; text-transform:uppercase; line-height:1; }
        .info p { color:#777; font-size:15px; margin-top:6px; }
        .right-side { text-align:right; min-width:140px; }
        .price { font-size:28px; font-weight:900; }
        .btn { background:#fff; color:#000; padding:10px 20px; border-radius:10px; text-decoration:none; font-weight:900; font-size:13px; margin-top:12px; display:inline-block; }
        .flash { color:#ff4757; font-size:12px; font-weight:800; display:block; margin-top:6px; }

        @media (max-width: 600px) {
            .ticket { padding: 18px; border-left-width: 10px; }
            .info h3 { font-size: 18px; }
            .price { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BIGLIETTI</h1>
        <p class="subtitle">Seleziona e vai al pagamento</p>
        <div id="ticket-list" class="list">Caricamento in corso...</div>
    </div>

    <script>
        async function fetchTickets() {
            const container = document.getElementById('ticket-list');
            try {
                const r = await fetch('dati-ticket.json?v=' + Date.now());
                const data = await r.json();
                let tickets = Array.isArray(data) ? data : (data[""] || []);

                // PULIZIA: Rimuove duplicati e righe senza nome
                const cleanTickets = tickets
                    .filter(t => t.nome && t.nome.trim() !== "")
                    .filter((v, i, a) => a.findIndex(t => t.nome === v.nome) === i);

                if (cleanTickets.length === 0) {
                    container.innerHTML = "<p style='color:#444'>Nessun biglietto disponibile.</p>";
                    return;
                }

                container.innerHTML = cleanTickets.map(t => {
                    const c = t.colore || '#333';
                    const tagHtml = (t.tag && t.tag.trim() !== "" && t.tag.toLowerCase() !== 'off') 
                        ? `<span class="tag" style="color:${c}; border-color:${c}">${t.tag}</span>` 
                        : '';

                    return `
                    <div class="ticket" style="border-left-color: ${c}">
                        <div class="info">
                            ${tagHtml}
                            <h3>${t.nome}</h3>
                            <p>${t.descrizione || ''}</p>
                            ${t.flashSaleAttivo === "TRUE" || t.flashSaleAttivo === true ? `<span class="flash">${t.flashSaleMsg}</span>` : ''}
                        </div>
                        <div class="right-side">
                            <span class="price">${t.prezzo},00 €</span>
                            <a href="#" class="btn">AGGIUNGI</a>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) { container.innerHTML = '<p>Errore di sincronizzazione...</p>'; }
        }
        fetchTickets();
    </script>
</body>
</html>
