<section id="tickets" class="tickets-container">
        <div id="loading-msg" style="text-align: center; width: 100%; color: #555;">Caricamento ticket in corso...</div>
    </section>

<script>
        // --- PARTE NUOVA: SINCRONIZZAZIONE TICKET ---
        const DATA_URL = './dati-ticket.json'; // Il file creato da n8n in /public

        async function caricaTicket() {
            try {
                const response = await fetch(DATA_URL);
                if (!response.ok) throw new Error("File non trovato");
                const tickets = await response.json();

                const container = document.getElementById('tickets');
                container.innerHTML = ''; // Puliamo il messaggio di caricamento

                tickets.forEach(t => {
                    // Creiamo la card per ogni riga "true" del foglio Google
                    const isVip = t.tag === 'VIP' || t.tag === 'EXCLUSIVE';
                    const card = document.createElement('div');
                    card.className = `ticket-card ${isVip ? 'vip' : ''}`;
                    
                    card.innerHTML = `
                        <h3>${t.nome} ${isVip ? '⚡' : ''}</h3>
                        <span class="price">${t.prezzo}€</span>
                        <p>${t.descrizione}</p>
                        <p style="font-size: 12px; color: #555; margin-top: 10px;">${t.tag}</p>
                        <a href="#" class="btn-primary" style="margin-top: 20px; padding: 10px 25px; font-size: 14px;">ACQUISTA</a>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Errore caricamento:", err);
                document.getElementById('loading-msg').innerHTML = "Ticket momentaneamente non disponibili.";
            }
        }

        // Avviamo il caricamento all'apertura della pagina
        caricaTicket();

    </script>
