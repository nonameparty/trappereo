<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="db-siteTitle">TRAPPEREO | BIELLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .modal {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.95);
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #0a0a0a; border: 2px solid #8a2be2; padding: 40px;
            border-radius: 30px; width: 90%; max-width: 450px; position: relative;
            box-shadow: 0 0 60px rgba(138, 43, 226, 0.4); text-align: center;
        }
        .modal-content input, .modal-content select {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #222; background: #111; color: white; font-size: 16px;
        }
        .close-modal { position: absolute; right: 25px; top: 20px; color: #555; font-size: 35px; cursor: pointer; }
        .btn-staff-purple { background: #8a2be2; color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 900; width: 100%; text-transform: uppercase; margin-top: 10px; }
        .btn-staff-outline { background: transparent; border: 1px solid #444; color: white; padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            
            <div id="staffMenu">
                <h2 style="color:white; font-weight: 900; margin-bottom: 30px;">STAFF HUB</h2>
                <button type="button" onclick="showSection('loginForm')" class="btn-staff-purple">ACCEDI</button>
                <button type="button" onclick="showSection('regForm')" class="btn-staff-outline">REGISTRA PR</button>
            </div>

            <div id="loginForm" style="display:none;">
                <h2 style="color:white; margin-bottom: 20px;">LOGIN STAFF</h2>
                <input type="email" id="loginEmail" placeholder="EMAIL">
                <input type="password" id="loginPwd" placeholder="PASSWORD">
                <button type="button" id="btnDoLogin" class="btn-staff-purple">ENTRA</button>
                <p style="color:#555; margin-top:20px; cursor:pointer;" onclick="showSection('staffMenu')">← INDIETRO</p>
            </div>

            <div id="regForm" style="display:none;">
                <h2 style="color:white; margin-bottom: 20px;">NUOVO PR</h2>
                <input type="text" id="regNome" placeholder="NOME">
                <input type="text" id="regCognome" placeholder="COGNOME">
                <input type="email" id="regEmail" placeholder="EMAIL">
                <select id="regRuolo">
                    <option value="PR">PR</option>
                    <option value="CAPO-PR">CAPO-PR</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="FOUNDER">FOUNDER</option>
                </select>
                <button type="button" id="confirmReg" class="btn-staff-purple">INVIA PASSWORD</button>
                <p style="color:#555; margin-top:20px; cursor:pointer;" onclick="showSection('staffMenu')">← INDIETRO</p>
            </div>
        </div>
    </div>

    <nav class="navbar"><div id="db-navLogo" class="nav-logo">TRAPPEREO</div></nav>
    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 id="db-titoloHero" class="main-title">TRAPPEREO</h1>
            <p id="db-sottotitolo" class="subtitle">BIELLA • IL DEVASTO</p>
            <a href="#tickets" class="btn-primary">ACQUISTA BIGLIETTI</a>
        </div>
    </header>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyATKCIfFo6uPwEUTZh00QIVvAJrq1L0Pw8",
            authDomain: "trappereo-7a89a.firebaseapp.com",
            projectId: "trappereo-7a89a",
            storageBucket: "trappereo-7a89a.firebasestorage.app",
            messagingSenderId: "579456256023",
            appId: "1:579456256023:web:56c2f97bbbe82c371b7452",
            measurementId: "G-2E1F3EY50H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // SCORCIATOIA ⌘ + SHIFT + F
        window.addEventListener("keydown", (e) => {
            if (e.metaKey && e.shiftKey && e.code === 'KeyF') {
                e.preventDefault();
                document.getElementById("authModal").style.display = "flex";
            }
        });

        // FUNZIONE LOGIN REALE
        document.getElementById("btnDoLogin").onclick = () => {
            const email = document.getElementById("loginEmail").value;
            const pass = document.getElementById("loginPwd").value;
            firebase.auth().signInWithEmailAndPassword(email, pass)
                .then(() => { alert("Accesso eseguito!"); location.reload(); })
                .catch(err => alert("Errore: " + err.message));
        };

        // REGISTRAZIONE CON PASSWORD ROBERT2003
        document.getElementById("confirmReg").onclick = () => {
            const check = prompt("SICUREZZA: Password per autorizzare?");
            if (check === "ROBERT2003") {
                const email = document.getElementById("regEmail").value;
                const nome = document.getElementById("regNome").value;
                const ruolo = document.getElementById("regRuolo").value;
                const autoPwd = "TR-" + Math.random().toString(36).slice(-6).toUpperCase();

                firebase.auth().createUserWithEmailAndPassword(email, autoPwd).then((u) => {
                    return db.collection("staff").doc(u.user.uid).set({ nome, email, ruolo });
                }).then(() => {
                    const postino = "https://script.google.com/macros/s/AKfycbxvLmdizVKe3vpV8l2TJqRvVNXnVVs_bAoMnKX4eWKMN8xi1VYqyS-6cYV7H9tEqJaZ/exec";
                    fetch(postino, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nome, email, ruolo, password: autoPwd }) });
                    alert("Account creato!"); location.reload();
                }).catch(err => alert(err.message));
            } else { alert("Password Errata!"); }
        };

        // GESTIONE UI
        function showSection(id) {
            document.getElementById("staffMenu").style.display = "none";
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("regForm").style.display = "none";
            document.getElementById(id).style.display = "block";
        }
        function closeModal() { document.getElementById("authModal").style.display = "none"; showSection('staffMenu'); }
    </script>
</body>
</html>
