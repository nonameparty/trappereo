<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="db-siteTitle">TRAPPEREO | BIELLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS per il POP-UP al centro */
        .modal {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1a1a1a; border: 2px solid #8a2be2; padding: 30px;
            border-radius: 20px; width: 90%; max-width: 400px; position: relative;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5); text-align: center;
        }
        .modal-content input, .modal-content select {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white;
        }
        .close-modal { position: absolute; right: 20px; top: 15px; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            
            <div id="adminPanel">
                <h2 style="color:#8a2be2; margin-bottom: 20px;">STAFF PANEL</h2>
                <button type="button" id="showRegForm" class="btn-auth-viola" style="width:100%; margin-bottom:10px;">REGISTRA NUOVO STAFF</button>
                <button type="button" class="btn-auth-outline" style="width:100%;">DASHBOARD PR (SOON)</button>
            </div>

            <div id="regForm" style="display:none;">
                <h2 style="color:white; margin-bottom: 20px;">NUOVO ACCOUNT</h2>
                <input type="text" id="regNome" placeholder="NOME">
                <input type="text" id="regCognome" placeholder="COGNOME">
                <input type="email" id="regEmail" placeholder="EMAIL">
                <select id="regRuolo">
                    <option value="PR">PR</option>
                    <option value="CAPO-PR">CAPO-PR</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="FOUNDER">FOUNDER</option>
                </select>
                <button type="button" id="confirmReg" class="btn-auth-viola" style="width:100%; margin-top:10px;">GENERA E INVIA PASSWORD</button>
                <p style="color:gray; font-size:12px; margin-top:15px; cursor:pointer;" onclick="resetModal()">← Indietro</p>
            </div>
        </div>
    </div>

    <nav class="navbar"><div id="db-navLogo" class="nav-logo">TRAPPEREO</div></nav>
    <header class="hero">
        <h1 id="db-titoloHero" class="main-title">TRAPPEREO</h1>
        <p id="db-sottotitolo" class="subtitle">BIELLA • IL DEVASTO</p>
        <a href="#tickets" id="mainBuyBtn" class="btn-primary">ACQUISTA BIGLIETTI</a>
    </header>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyATKCIfFo6uPwEUTZh00QIVvAJrq1L0Pw8",
            authDomain: "trappereo-7a89a.firebaseapp.com",
            projectId: "trappereo-7a89a",
            storageBucket: "trappereo-7a89a.firebasestorage.app",
            messagingSenderId: "579456256023",
            appId: "1:579456256023:web:56c2f97bbbe82c371b7452",
            measurementId: "G-2E1F3EY50H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. SCORCIATOIA MAC: CMD + SHIFT + F
        window.addEventListener("keydown", (e) => {
            if (e.metaKey && e.shiftKey && e.code === 'KeyF') {
                e.preventDefault();
                document.getElementById("authModal").style.display = "flex";
            }
        });

        // 2. SINCRONIZZAZIONE DB (Auto-riparazione se vuoto)
        function syncDB() {
            db.collection("config").doc("testi").onSnapshot((doc) => {
                if (doc.exists) {
                    const d = doc.data();
                    document.getElementById("db-titoloHero").innerText = d.titoloHero || "TRAPPEREO";
                    document.getElementById("db-sottotitolo").innerText = d.sottotitolo || "BIELLA";
                } else {
                    // Se non c'è nulla, crea i dati base
                    db.collection("config").doc("testi").set({
                        titoloHero: "TRAPPEREO",
                        sottotitolo: "BIELLA • IL DEVASTO",
                        navLogo: "TRAPPEREO"
                    });
                }
            });
        }
        syncDB();

        // 3. REGISTRAZIONE CON PASSWORD ROBERT2003
        document.getElementById("confirmReg").onclick = () => {
            const pwdCheck = prompt("PASSWORD DI SICUREZZA RICHIESTA:");
            
            if (pwdCheck === "ROBERT2003") {
                const nome = document.getElementById("regNome").value;
                const cognome = document.getElementById("regCognome").value;
                const email = document.getElementById("regEmail").value;
                const ruolo = document.getElementById("regRuolo").value;
                const autoPwd = "TR-" + Math.random().toString(36).slice(-6).toUpperCase();

                if(!nome || !email) { alert("Dati mancanti!"); return; }

                firebase.auth().createUserWithEmailAndPassword(email, autoPwd).then((u) => {
                    return db.collection("staff").doc(u.user.uid).set({
                        nome: nome, cognome: cognome, email: email, ruolo: ruolo, data: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }).then(() => {
                    const postino = "https://script.google.com/macros/s/AKfycbxvLmdizVKe3vpV8l2TJqRvVNXnVVs_bAoMnKX4eWKMN8xi1VYqyS-6cYV7H9tEqJaZ/exec";
                    fetch(postino, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nome: nome, email: email, ruolo: ruolo, password: autoPwd }) });
                    alert("Account creato e Password inviata!");
                    location.reload();
                }).catch(err => alert(err.message));
            } else {
                alert("Password Errata!");
            }
        };

        // Funzioni UI
        document.getElementById("showRegForm").onclick = () => {
            document.getElementById("adminPanel").style.display = "none";
            document.getElementById("regForm").style.display = "block";
        };
        function resetModal() {
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("regForm").style.display = "none";
        }
        document.querySelector(".close-modal").onclick = () => document.getElementById("authModal").style.display = "none";
    </script>
</body>
</html>
