<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="db-siteTitle">TRAPPEREO | BIELLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* STILE POP-UP CENTRATO */
        .modal {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.95);
            align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #0a0a0a; border: 2px solid #8a2be2; padding: 35px;
            border-radius: 25px; width: 90%; max-width: 400px; text-align: center;
        }
        .modal-content input, .modal-content select {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #222; background: #111; color: white;
        }
        .btn-staff-purple { background: #8a2be2; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 900; width: 100%; text-transform: uppercase; margin-top: 10px; }
        .btn-staff-outline { background: transparent; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
        .close-modal { position: absolute; right: 20px; top: 15px; color: #555; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="authModal" class="modal">
        <div class="modal-content" style="position: relative;">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="staffMenu">
                <h2 style="color:white; font-weight: 900; margin-bottom: 25px;">STAFF HUB</h2>
                <button type="button" onclick="showSection('loginForm')" class="btn-staff-purple">ACCEDI</button>
                <button type="button" onclick="showSection('regForm')" class="btn-staff-outline">REGISTRA PR</button>
            </div>
            <div id="loginForm" style="display:none;">
                <h2 style="color:white; margin-bottom: 20px;">LOGIN</h2>
                <input type="email" id="loginEmail" placeholder="EMAIL">
                <input type="password" id="loginPwd" placeholder="PASSWORD">
                <button type="button" id="btnDoLogin" class="btn-staff-purple">ENTRA</button>
                <p style="color:#555; margin-top:15px; cursor:pointer;" onclick="showSection('staffMenu')">← INDIETRO</p>
            </div>
            <div id="regForm" style="display:none;">
                <h2 style="color:white; margin-bottom: 20px;">NUOVO PR</h2>
                <input type="text" id="regNome" placeholder="NOME">
                <input type="email" id="regEmail" placeholder="EMAIL">
                <select id="regRuolo">
                    <option value="PR">PR</option>
                    <option value="FOUNDER">FOUNDER</option>
                </select>
                <button type="button" id="confirmReg" class="btn-staff-purple">INVIA PASSWORD</button>
                <p style="color:#555; margin-top:15px; cursor:pointer;" onclick="showSection('staffMenu')">← INDIETRO</p>
            </div>
        </div>
    </div>

    <nav class="navbar"><div id="db-navLogo" class="nav-logo">TRAPPEREO</div></nav>

    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 id="db-titoloHero" class="main-title">TRAPPEREO</h1>
            <p id="db-sottotitolo" class="subtitle">BIELLA • IL DEVASTO</p>
            <a href="#tickets" class="btn-primary">ACQUISTA BIGLIETTI</a>
        </div>
    </header>

    <section class="alert-section">
        <div class="alert-banner">
            <h2 id="db-alertTitolo">⚡ PROSSIMAMENTE ⚡</h2>
            <p id="db-alertRosso" style="color: red; font-weight: bold;">🔥 INGRESSO 16+ 🔥</p>
            <p id="db-alertAvviso">⚠️ ACCREDITO OBBLIGATORIO ⚠️</p>
        </div>
    </section>

    <section id="tickets" class="tickets-section" style="padding: 50px 20px; text-align: center;">
        <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
            <div style="background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; min-width: 250px;">
                <h3>EARLY BIRD</h3>
                <h2 id="db-prezzo1" style="color: #8a2be2;">15€</h2>
                <p>Ingresso + 1 Drink</p>
            </div>
            <div style="background: #111; padding: 30px; border-radius: 20px; border: 2px solid #8a2be2; min-width: 250px;">
                <h3>SALTACODA</h3>
                <h2 id="db-prezzo2" style="color: #8a2be2;">20€</h2>
                <p>Ingresso Rapido + 1 Drink</p>
            </div>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyATKCIfFo6uPwEUTZh00QIVvAJrq1L0Pw8",
            authDomain: "trappereo-7a89a.firebaseapp.com",
            projectId: "trappereo-7a89a",
            storageBucket: "trappereo-7a89a.firebasestorage.app",
            messagingSenderId: "579456256023",
            appId: "1:579456256023:web:56c2f97bbbe82c371b7452",
            measurementId: "G-2E1F3EY50H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // SCORCIATOIA ⌘ + SHIFT + F
        window.addEventListener("keydown", (e) => {
            if (e.metaKey && e.shiftKey && e.code === 'KeyF') {
                e.preventDefault();
                document.getElementById("authModal").style.display = "flex";
            }
        });

        // REGISTRAZIONE CON ROBERT2003
        document.getElementById("confirmReg").onclick = function() {
            const passSecurity = prompt("PASSWORD DI SICUREZZA:");
            if (passSecurity === "ROBERT2003") {
                const email = document.getElementById("regEmail").value;
                const nome = document.getElementById("regNome").value;
                const ruolo = document.getElementById("regRuolo").value;
                const autoPwd = "TR-" + Math.random().toString(36).slice(-6).toUpperCase();

                firebase.auth().createUserWithEmailAndPassword(email, autoPwd).then((u) => {
                    return db.collection("staff").doc(u.user.uid).set({ nome, email, ruolo });
                }).then(() => {
                    const postino = "https://script.google.com/macros/s/AKfycbxvLmdizVKe3vpV8l2TJqRvVNXnVVs_bAoMnKX4eWKMN8xi1VYqyS-6cYV7H9tEqJaZ/exec";
                    fetch(postino, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nome, email, ruolo, password: autoPwd }) });
                    alert("Account creato e Mail inviata!");
                    location.reload();
                }).catch(err => alert(err.message));
            } else { alert("Password Errata!"); }
        };

        document.getElementById("btnDoLogin").onclick = () => {
            const email = document.getElementById("loginEmail").value;
            const pass = document.getElementById("loginPwd").value;
            firebase.auth().signInWithEmailAndPassword(email, pass).then(() => { 
                alert("Bentornato!"); location.reload(); 
            }).catch(err => alert(err.message));
        };

        function showSection(id) {
            document.getElementById("staffMenu").style.display = "none";
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("regForm").style.display = "none";
            document.getElementById(id).style.display = "block";
        }
        function closeModal() { document.getElementById("authModal").style.display = "none"; showSection('staffMenu'); }
    </script>
</body>
</html>
