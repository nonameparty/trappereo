<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="db-siteTitle">TRAPPEREO | BIELLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="authModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            
            <div id="adminPanel" style="text-align:center;">
                <h2 style="color:white; margin-bottom: 20px;">PANNELLO STAFF</h2>
                <div class="auth-buttons-row" style="display:flex; flex-direction:column; gap:15px;">
                    <button type="button" id="showRegForm" class="btn-auth-viola">REGISTRA NUOVO STAFF</button>
                    <button type="button" id="btnStaffLogin" class="btn-auth-outline">ACCEDI ALLA TUA DASHBOARD</button>
                </div>
            </div>

            <div id="regForm" style="display:none;">
                <h2 style="color:white; margin-bottom: 20px;">NUOVO ACCOUNT STAFF</h2>
                <input type="text" id="regNome" placeholder="NOME" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;">
                <input type="text" id="regCognome" placeholder="COGNOME" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;">
                <input type="email" id="regEmail" placeholder="EMAIL" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;">
                <select id="regRuolo" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px;">
                    <option value="PR">PR</option>
                    <option value="CAPO-PR">CAPO-PR</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="FOUNDER">FOUNDER</option>
                </select>
                <button type="button" id="confirmReg" class="btn-auth-viola" style="width:100%;">GENERA E INVIA PASSWORD</button>
                <p style="color:gray; font-size:12px; margin-top:10px; cursor:pointer;" onclick="location.reload()">← Torna indietro</p>
            </div>
        </div>
    </div>

    <nav class="navbar"><div id="db-navLogo" class="nav-logo">TRAPPEREO</div></nav>
    <header class="hero">
        <h1 id="db-titoloHero" class="main-title">...</h1>
        <p id="db-sottotitolo" class="subtitle">...</p>
        <a href="#tickets" id="mainBuyBtn" class="btn-primary">ACQUISTA BIGLIETTI</a>
    </header>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyATKCIfFo6uPwEUTZh00QIVvAJrq1L0Pw8",
            authDomain: "trappereo-7a89a.firebaseapp.com",
            projectId: "trappereo-7a89a",
            storageBucket: "trappereo-7a89a.firebasestorage.app",
            messagingSenderId: "579456256023",
            appId: "1:579456256023:web:56c2f97bbbe82c371b7452",
            measurementId: "G-2E1F3EY50H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. SCORCIATOIA: CMD/CTRL + SHIFT + A (Entra diretto)
        window.addEventListener("keydown", (e) => {
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.code === 'KeyA') {
                document.getElementById("authModal").style.display = "flex";
            }
        });

        // 2. LOGICA REGISTRAZIONE CON PASSWORD DI SICUREZZA
        document.getElementById("confirmReg").onclick = () => {
            // Chiede la password ROBERT2003 prima di procedere
            const check = prompt("Inserisci la Password di Sicurezza per registrare:");
            
            if (check === "ROBERT2003") {
                const nome = document.getElementById("regNome").value;
                const email = document.getElementById("regEmail").value;
                const ruolo = document.getElementById("regRuolo").value;
                
                if(!nome || !email) { alert("Compila tutti i campi!"); return; }

                // Genera Password Casuale
                const autoPwd = "TR-" + Math.random().toString(36).slice(-6).toUpperCase();

                firebase.auth().createUserWithEmailAndPassword(email, autoPwd)
                .then((u) => {
                    return db.collection("staff").doc(u.user.uid).set({
                        nome: nome, email: email, ruolo: ruolo,
                        data: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    // Invia Email tramite Google Script
                    const postinoURL = "https://script.google.com/macros/s/AKfycbxvLmdizVKe3vpV8l2TJqRvVNXnVVs_bAoMnKX4eWKMN8xi1VYqyS-6cYV7H9tEqJaZ/exec";
                    
                    fetch(postinoURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ nome: nome, email: email, ruolo: ruolo, password: autoPwd })
                    });

                    alert("ACCOUNT CREATO! Password inviata via email.");
                    location.reload();
                })
                .catch(err => alert("Errore: " + err.message));
            } else {
                alert("Password errata. Azione annullata.");
            }
        };

        // Gestione Visualizzazione
        document.getElementById("showRegForm").onclick = () => {
            document.getElementById("adminPanel").style.display = "none";
            document.getElementById("regForm").style.display = "block";
        };

        document.querySelector(".close-modal").onclick = () => document.getElementById("authModal").style.display = "none";
        document.getElementById("mainBuyBtn").onclick = (e) => { e.preventDefault(); alert("Prevendite non ancora aperte."); };
    </script>
</body>
</html>
