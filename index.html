<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="db-siteTitle">TRAPPEREO | BIELLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modalTitle">PANNELLO ADMIN</h2>
            <form id="authForm">
                <input type="text" id="regNome" placeholder="NOME" required>
                <input type="text" id="regCognome" placeholder="COGNOME" required>
                <input type="email" id="email" placeholder="EMAIL" required>
                <input type="password" id="password" placeholder="PASSWORD" required>
                <div class="auth-buttons-row">
                    <button type="button" id="btnSignUp" class="btn-auth-viola">REGISTRA UTENTE</button>
                    <button type="button" id="btnSignIn" class="btn-auth-outline">ACCEDI</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="navbar">
        <div id="db-navLogo" class="nav-logo">...</div>
        <div class="nav-links">
            <a href="#faq" id="db-navInfo">INFO</a>
            <a id="db-igLink" href="#" target="_blank">IG</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 id="db-titoloHero" class="main-title">...</h1>
            <p id="db-sottotitolo" class="subtitle">...</p>
            <a href="#tickets" id="db-btnHero" class="btn-primary">...</a>
        </div>
    </header>

    <section class="locandina-digital">
        <div class="alert-banner">
            <h2 id="db-alertTitolo">...</h2>
            <p id="db-alertRosso" class="red-text">...</p>
            <p id="db-alertAvviso">...</p>
            <small id="db-alertSmall">...</small>
        </div>
    </section>

    <section id="tickets" class="tickets-section">
        <div class="ticket-grid">
            <div class="ticket-box">
                <h3 id="db-t1-nome">...</h3>
                <span id="db-t1-prezzo" class="price">...</span>
                <p id="db-t1-desc">...</p>
            </div>
            <div class="ticket-box highlight">
                <h3 id="db-t2-nome">...</h3>
                <span id="db-t2-prezzo" class="price">...</span>
                <p id="db-t2-desc">...</p>
            </div>
            <div class="ticket-box">
                <h3 id="db-t3-nome">...</h3>
                <span id="db-t3-prezzo" class="price">...</span>
                <p id="db-t3-desc">...</p>
            </div>
        </div>
        <p id="db-disclaimer" class="disclaimer">...</p>
    </section>

    <section id="faq" class="faq-section">
        <h2 id="db-faqTitolo" class="sec-title">...</h2>
        <div class="accordion">
            <div class="accordion-item">
                <button class="accordion-header"><span id="db-q1">...</span> <span>+</span></button>
                <div class="accordion-body" id="db-a1">...</div>
            </div>
            <div class="accordion-item">
                <button class="accordion-header"><span id="db-q2">...</span> <span>+</span></button>
                <div class="accordion-body" id="db-a2">...</div>
            </div>
        </div>
    </section>

    <footer>
        <p id="db-footerText">...</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // CONFIGURAZIONE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyATKCIfFo6uPwEUTZh00QIVvAJrq1L0Pw8",
            authDomain: "trappereo-7a89a.firebaseapp.com",
            projectId: "trappereo-7a89a",
            storageBucket: "trappereo-7a89a.firebasestorage.app",
            messagingSenderId: "579456256023",
            appId: "1:579456256023:web:56c2f97bbbe82c371b7452",
            measurementId: "G-2E1F3EY50H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- FUNZIONE SINCRONIZZAZIONE TOTALE ---
        function sincronizzaTutto() {
            const docRef = db.collection("config").doc("testi");

            docRef.onSnapshot((doc) => {
                if (doc.exists) {
                    const d = doc.data();
                    // Associa ogni ID del sito a un campo su Firebase
                    const mapping = {
                        "db-siteTitle": d.siteTitle,
                        "db-navLogo": d.navLogo,
                        "db-navInfo": d.navInfo,
                        "db-titoloHero": d.titoloHero,
                        "db-sottotitolo": d.sottotitolo,
                        "db-btnHero": d.btnHero,
                        "db-alertTitolo": d.alertTitolo,
                        "db-alertRosso": d.alertRosso,
                        "db-alertAvviso": d.alertAvviso,
                        "db-alertSmall": d.alertSmall,
                        "db-t1-nome": d.t1_nome, "db-t1-prezzo": d.t1_prezzo, "db-t1-desc": d.t1_desc,
                        "db-t2-nome": d.t2_nome, "db-t2-prezzo": d.t2_prezzo, "db-t2-desc": d.t2_desc,
                        "db-t3-nome": d.t3_nome, "db-t3-prezzo": d.t3_prezzo, "db-t3-desc": d.t3_desc,
                        "db-disclaimer": d.disclaimer,
                        "db-faqTitolo": d.faqTitolo,
                        "db-q1": d.q1, "db-a1": d.a1,
                        "db-q2": d.q2, "db-a2": d.a2,
                        "db-footerText": d.footerText
                    };
                    for (let id in mapping) {
                        let el = document.getElementById(id);
                        if (el && mapping[id]) el.innerText = mapping[id];
                    }
                    if(d.igLink) document.getElementById("db-igLink").href = d.igLink;
                } else {
                    // SE IL DATABASE È VUOTO, LO CREA AUTOMATICAMENTE
                    docRef.set({
                        siteTitle: "TRAPPEREO | BIELLA",
                        navLogo: "TRAPPEREO",
                        navInfo: "INFO",
                        igLink: "https://instagram.com/tuoprofilo",
                        titoloHero: "TRAPPEREO",
                        sottotitolo: "BIELLA • IL DEVASTO",
                        btnHero: "ACQUISTA BIGLIETTI",
                        alertTitolo: "⚡ PROSSIMAMENTE ⚡",
                        alertRosso: "🔥 INGRESSO 16+ 🔥",
                        alertAvviso: "⚠️ ACCREDITO ONLINE OBBLIGATORIO ⚠️",
                        alertSmall: "(Nessuna vendita in cassa)",
                        t1_nome: "STANDARD", t1_prezzo: "15€", t1_desc: "Ingresso + 1 Drink",
                        t2_nome: "SALTACODA ⚡", t2_prezzo: "20€", t2_desc: "Priorità + 1 Drink",
                        t3_nome: "VIP 👑", t3_prezzo: "29€", t3_desc: "Area riservata + 3 Drink",
                        disclaimer: "* Alcolici solo 18+.",
                        faqTitolo: "DOMANDE FREQUENTI",
                        q1: "Età minima?", a1: "Ingresso dai 16 anni con documento originale.",
                        q2: "Posso pagare all'ingresso?", a2: "No, evento solo su accredito online.",
                        footerText: "© TRAPPEREO BIELLA - Tutti i diritti riservati"
                    });
                }
            });
        }
        sincronizzaTutto();

        // --- LOGICA MODALE ADMIN (⌥ + Shift + A) ---
        const modal = document.getElementById("authModal");
        window.addEventListener("keydown", (e) => {
            if (e.altKey && e.shiftKey && e.code === 'KeyA') modal.style.display = "flex";
        });

        document.getElementById("btnSignUp").onclick = () => {
            const n = document.getElementById("regNome").value;
            const c = document.getElementById("regCognome").value;
            const em = document.getElementById("email").value;
            const ps = document.getElementById("password").value;
            
            firebase.auth().createUserWithEmailAndPassword(em, ps).then((u) => {
                return db.collection("iscritti").doc(u.user.uid).set({
                    nome: n, cognome: c, email: em, data: firebase.firestore.FieldValue.serverTimestamp()
                });
            }).then(() => { 
                alert("Utente registrato nel Database!"); 
                modal.style.display = "none";
                document.getElementById("authForm").reset();
            }).catch(err => alert("Errore: " + err.message));
        };

        // ACCORDION FAQ
        document.querySelectorAll('.accordion-header').forEach(b => {
            b.onclick = () => {
                const body = b.nextElementSibling;
                body.style.display = body.style.display === 'block' ? 'none' : 'block';
            }
        });

        document.querySelector(".close-modal").onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; }
    </script>
</body>
</html>
