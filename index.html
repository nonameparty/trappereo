<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAPPEREO | BIELLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #8a2be2; --red: #ff0000; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; }

        /* HEADER FIGO ORIGINALE */
        .navbar { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: absolute; width: 100%; z-index: 10; }
        .nav-logo { font-weight: 900; font-size: 24px; letter-spacing: 2px; }
        
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1514525253361-bee8a187446b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; }
        .main-title { font-size: clamp(50px, 12vw, 120px); font-weight: 900; text-transform: uppercase; line-height: 0.9; margin-bottom: 20px; text-shadow: 8px 8px 0px var(--purple); }
        .subtitle { font-size: 18px; font-weight: 700; letter-spacing: 5px; color: #ccc; margin-bottom: 30px; }
        
        .btn-primary { background: var(--purple); color: white; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: 900; font-size: 16px; transition: 0.3s; display: inline-block; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--purple); }

        /* BANNER ALERT */
        .alert-banner { background: #111; padding: 60px 20px; text-align: center; border-top: 4px solid var(--purple); }
        .alert-banner h2 { font-size: 32px; font-weight: 900; margin-bottom: 10px; }
        .alert-banner .red-text { color: var(--red); font-size: 24px; font-weight: 900; margin: 15px 0; }

        /* TICKETS */
        .tickets { padding: 80px 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .ticket-card { background: #0a0a0a; border: 1px solid #222; padding: 40px; border-radius: 30px; text-align: center; transition: 0.3s; }
        .ticket-card.vip { border: 2px solid var(--purple); box-shadow: 0 0 20px rgba(138,43,226,0.2); }
        .ticket-card h3 { font-size: 24px; margin-bottom: 10px; }
        .ticket-card .price { font-size: 48px; font-weight: 900; color: var(--purple); margin-bottom: 20px; display: block; }

        /* MODALE POPUP */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a0a; border: 2px solid var(--purple); padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; position: relative; }
        .modal-content h2 { margin-bottom: 25px; font-weight: 900; }
        .modal-content input, .modal-content select { width: 100%; padding: 15px; margin-bottom: 15px; background: #111; border: 1px solid #222; color: white; border-radius: 10px; font-size: 16px; }
        .btn-send { background: var(--purple); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .close-btn { position: absolute; right: 20px; top: 20px; font-size: 30px; cursor: pointer; color: #444; }
    </style>
</head>
<body>

    <nav class="navbar"><div class="nav-logo">TRAPPEREO</div></nav>

    <header class="hero">
        <div class="hero-content">
            <h1 class="main-title">TRAPPEREO</h1>
            <p class="subtitle">BIELLA • IL DEVASTO</p>
            <a href="#tickets" class="btn-primary">ACQUISTA BIGLIETTI</a>
        </div>
    </header>

    <section class="alert-banner">
        <h2>⚡ PROSSIMAMENTE ⚡</h2>
        <div class="red-text">🔥 INGRESSO 16+ 🔥</div>
        <p style="letter-spacing: 2px; font-weight: 700;">⚠️ ACCREDITO ONLINE OBBLIGATORIO ⚠️</p>
    </section>

    <section id="tickets" class="tickets">
        <div class="ticket-card">
            <h3>STANDARD</h3>
            <span class="price">15€</span>
            <p>Ingresso + 1 Drink</p>
        </div>
        <div class="ticket-card vip">
            <h3>SALTACODA ⚡</h3>
            <span class="price">20€</span>
            <p>Priorità + 1 Drink</p>
        </div>
    </section>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="menu">
                <h2>STAFF HUB</h2>
                <button class="btn-send" onclick="show('loginForm')">ACCEDI</button>
                <button style="margin-top:10px; background:transparent; border:1px solid #444;" class="btn-send" onclick="show('regForm')">REGISTRA</button>
            </div>
            <div id="loginForm" style="display:none;">
                <h2>LOGIN</h2>
                <input type="email" id="lEmail" placeholder="EMAIL">
                <input type="password" id="lPass" placeholder="PASSWORD">
                <button class="btn-send" id="doLogin">ENTRA</button>
                <p style="margin-top:15px; cursor:pointer; color:#555;" onclick="show('menu')">← Indietro</p>
            </div>
            <div id="regForm" style="display:none;">
                <h2>NUOVO ACCOUNT</h2>
                <input type="text" id="rNome" placeholder="NOME">
                <input type="email" id="rEmail" placeholder="EMAIL">
                <select id="rRuolo">
                    <option value="PR">PR</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
                <button class="btn-send" id="doReg">GENERA E INVIA PASSWORD</button>
                <p style="margin-top:15px; cursor:pointer; color:#555;" onclick="show('menu')">← Indietro</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyATKCIfFo6uPwEUTZh00QIVvAJrq1L0Pw8",
            authDomain: "trappereo-7a89a.firebaseapp.com",
            projectId: "trappereo-7a89a",
            storageBucket: "trappereo-7a89a.firebasestorage.app",
            messagingSenderId: "579456256023",
            appId: "1:579456256023:web:56c2f97bbbe82c371b7452"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ⌘ + SHIFT + F
        window.addEventListener("keydown", (e) => {
            if (e.metaKey && e.shiftKey && e.code === 'KeyF') {
                e.preventDefault();
                document.getElementById("authModal").style.display = "flex";
            }
        });

        // REGISTRAZIONE CON ROBERT2003
        document.getElementById("doReg").onclick = () => {
            const pwd = prompt("PASSWORD DI SICUREZZA:");
            if (pwd === "ROBERT2003") {
                const email = document.getElementById("rEmail").value;
                const nome = document.getElementById("rNome").value;
                const ruolo = document.getElementById("rRuolo").value;
                const autoPwd = "TR-" + Math.random().toString(36).slice(-6).toUpperCase();

                auth.createUserWithEmailAndPassword(email, autoPwd).then((u) => {
                    return db.collection("staff").doc(u.user.uid).set({ nome, email, ruolo });
                }).then(() => {
                    // Script Google
                    fetch("https://script.google.com/macros/s/AKfycbxvLmdizVKe3vpV8l2TJqRvVNXnVVs_bAoMnKX4eWKMN8xi1VYqyS-6cYV7H9tEqJaZ/exec", {
                        method: 'POST', mode: 'no-cors', body: JSON.stringify({ nome, email, ruolo, password: autoPwd })
                    });
                    alert("Account creato!"); location.reload();
                }).catch(err => alert("Errore Firebase: " + err.message));
            } else { alert("Password Errata!"); }
        };

        // LOGIN
        document.getElementById("doLogin").onclick = () => {
            auth.signInWithEmailAndPassword(document.getElementById("lEmail").value, document.getElementById("lPass").value)
            .then(() => alert("Accesso eseguito!"))
            .catch(err => alert(err.message));
        };

        function show(id) {
            ['menu','loginForm','regForm'].forEach(s => document.getElementById(s).style.display = "none");
            document.getElementById(id).style.display = "block";
        }
        function closeModal() { document.getElementById("authModal").style.display = "none"; show('menu'); }
    </script>
</body>
</html>
