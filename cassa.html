<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASSA POS | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #8a2be2; --green: #2ecc71; --dark: #000; --light: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--dark); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header-cassa { height: 70px; background: #000; display: flex; justify-content: center; align-items: center; padding: 0 30px; border-bottom: 1px solid #222; }
        
        .toggle-pay { 
            padding: 12px 40px; border-radius: 8px; border: 2px solid #333; 
            font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase;
            background: #000; color: #666; font-size: 14px; letter-spacing: 1px;
        }
        .toggle-pay.active { background: var(--green); color: black; border-color: var(--green); box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* SINISTRA: MENU CHIARO (VISIBILITÀ MAX) */
        .menu-grid { 
            flex: 1.7; background: var(--light); padding: 20px; 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 130px; gap: 15px;
            overflow-y: auto;
        }
        .btn-item { 
            background: white; border: 2px solid #ddd; color: black; border-radius: 15px; 
            font-weight: 900; font-size: 19px; cursor: pointer; box-shadow: 0 5px 0 #eee;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-item:active { transform: translateY(3px); box-shadow: none; }
        .btn-item span { color: var(--purple); font-size: 15px; margin-top: 5px; }

        /* DESTRA: RIEPILOGO */
        .summary-panel { flex: 1; background: #000; display: flex; flex-direction: column; border-left: 2px solid #222; }
        .summary-header { padding: 20px; font-size: 12px; letter-spacing: 2px; border-bottom: 1px solid #111; font-weight: 900; color: #444; text-transform: uppercase; }
        
        .order-list { flex: 1; overflow-y: auto; padding: 15px; }
        
        .order-row { 
            background: #0a0a0a; margin-bottom: 8px; padding: 18px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a;
        }
        .row-name { font-weight: 900; font-size: 17px; text-transform: uppercase; color: white; }
        .row-price { color: var(--purple); font-size: 13px; font-weight: 700; }
        
        .row-controls { display: flex; align-items: center; gap: 12px; }
        .qty-btn { width: 35px; height: 35px; border-radius: 8px; border: none; font-weight: 900; cursor: pointer; font-size: 18px; }
        .minus { background: #1a1a1a; color: #ff4444; }
        .plus { background: #1a1a1a; color: var(--green); }
        .qty-val { font-size: 18px; font-weight: 900; min-width: 25px; text-align: center; color: white; }

        /* FOOTER CON TOTALE SOTTO */
        .summary-footer { padding: 20px; background: #050505; border-top: 1px solid #222; }
        .total-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        .total-label { font-size: 14px; font-weight: 900; color: #666; text-transform: uppercase; }
        .total-amount { font-size: 38px; font-weight: 900; color: white; }

        .btn-checkout { 
            width: 100%; padding: 22px; background: var(--purple); border: none; 
            border-radius: 12px; color: white; font-weight: 900; font-size: 20px; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-checkout:active { background: #7022b8; }
    </style>
</head>
<body>

    <header class="header-cassa">
        <button id="sepToggle" class="toggle-pay" onclick="toggleSeparato()">PAGA SEPARATO: OFF</button>
    </header>

    <div class="main-container">
        <div class="menu-grid">
            <button class="btn-item" onclick="addToCart('DRINK', 10)">DRINK <span>10€</span></button>
            <button class="btn-item" onclick="addToCart('PREMIUM', 12)">PREMIUM <span>12€</span></button>
            <button class="btn-item" onclick="addToCart('BIRRA', 6)">BIRRA <span>6€</span></button>
            <button class="btn-item" onclick="addToCart('ANALCOLICO', 6)">ANALCOLICO <span>6€</span></button>
            <button class="btn-item" onclick="addToCart('REDBULL', 8)">RED BULL <span>8€</span></button>
            <button class="btn-item" onclick="addToCart('SHOT', 3)">SHOT <span>3€</span></button>
            <button class="btn-item" onclick="addToCart('ACQUA', 3)">ACQUA <span>3€</span></button>
        </div>

        <div class="summary-panel">
            <div class="summary-header">Riepilogo Ordine</div>
            <div id="orderList" class="order-list">
                </div>
            
            <div class="summary-footer">
                <div class="total-box">
                    <span class="total-label">Totale da pagare</span>
                    <span class="total-amount"><span id="finalPrice">0</span>€</span>
                </div>
                <button class="btn-checkout" onclick="concludiVendita()">CHIUDI ORDINE</button>
            </div>
        </div>
    </div>

    <script>
        let carrello = [];
        let isSeparato = false;

        function toggleSeparato() {
            isSeparato = !isSeparato;
            const btn = document.getElementById('sepToggle');
            btn.innerText = isSeparato ? "PAGA SEPARATO: ON" : "PAGA SEPARATO: OFF";
            btn.classList.toggle('active');
            
            // Riordina e raggruppa/esplode in automatico
            reorganizeCart();
        }

        function reorganizeCart() {
            if (isSeparato) {
                // Esplode tutto in righe singole
                let nuovoCarrello = [];
                carrello.forEach(item => {
                    for(let i=0; i < item.qty; i++) {
                        nuovoCarrello.push({ nome: item.nome, prezzo: item.prezzo, qty: 1 });
                    }
                });
                carrello = nuovoCarrello;
            } else {
                // Raggruppa tutto per nome
                let mappa = {};
                carrello.forEach(item => {
                    if (mappa[item.nome]) {
                        mappa[item.nome].qty += item.qty;
                    } else {
                        mappa[item.nome] = { ...item };
                    }
                });
                carrello = Object.values(mappa);
            }
            renderCart();
        }

        function addToCart(nome, prezzo) {
            if (isSeparato) {
                carrello.push({ nome, prezzo, qty: 1 });
            } else {
                const esistente = carrello.find(i => i.nome === nome);
                if (esistente) { esistente.qty++; } 
                else { carrello.push({ nome, prezzo, qty: 1 }); }
            }
            renderCart();
        }

        function updateQty(index, delta) {
            carrello[index].qty += delta;
            if (carrello[index].qty <= 0) carrello.splice(index, 1);
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('orderList');
            const totalDisplay = document.getElementById('finalPrice');
            
            // Sempre in ordine alfabetico
            carrello.sort((a, b) => a.nome.localeCompare(b.nome));

            list.innerHTML = '';
            let totale = 0;

            carrello.forEach((item, index) => {
                totale += (item.prezzo * item.qty);
                const row = document.createElement('div');
                row.className = 'order-row';
                
                // Se separato metto la X, se unico metto + -
                const controls = isSeparato ? 
                    `<button class="qty-btn minus" onclick="updateQty(${index}, -1)">×</button>` : 
                    `<div class="row-controls">
                        <button class="qty-btn minus" onclick="updateQty(${index}, -1)">-</button>
                        <span class="qty-val">${item.qty}</span>
                        <button class="qty-btn plus" onclick="updateQty(${index}, 1)">+</button>
                    </div>`;

                row.innerHTML = `
                    <div>
                        <div class="row-name">${item.nome}</div>
                        <div class="row-price">${item.prezzo}€</div>
                    </div>
                    ${controls}
                `;
                list.appendChild(row);
            });
            totalDisplay.innerText = totale;
        }

        function concludiVendita() {
            if (carrello.length === 0) return;
            // Qui puoi aggiungere il salvataggio su Firebase come abbiamo visto prima
            alert("VENDITA EFFETTUATA!\nTotale: " + document.getElementById('finalPrice').innerText + "€");
            carrello = [];
            renderCart();
        }
    </script>
</body>
</html>
