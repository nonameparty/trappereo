<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASSA | TRAPPEREO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #8a2be2; --neon: #bc13fe; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: white; padding: 20px; }

        .header-cassa { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #111; padding-bottom: 15px; }
        .total-session { font-size: 24px; color: var(--purple); font-weight: 900; }

        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #444; margin-bottom: 15px; }

        /* GRID PER IL BAR */
        .grid-bar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 40px; }
        .btn-item { 
            background: #0e0e0e; border: 2px solid #222; color: white; padding: 25px 10px; 
            border-radius: 20px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-item span { font-size: 12px; color: var(--purple); margin-top: 5px; }
        .btn-item:active { transform: scale(0.95); background: var(--purple); border-color: white; }

        /* GUARDAROBA */
        .guardaroba-section { background: #0e0e0e; padding: 25px; border-radius: 30px; border: 1px solid #222; }
        .input-num { width: 100%; background: #000; border: 2px solid #333; color: white; padding: 20px; border-radius: 15px; font-size: 24px; text-align: center; margin-bottom: 15px; font-weight: 900; }
        .btn-giacca { background: white; color: black; border: none; width: 100%; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; }

        /* NOTIFICA VELOCE */
        #status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--purple); padding: 10px 30px; border-radius: 50px; display: none; font-weight: 900; }
    </style>
</head>
<body>

    <div class="header-cassa">
        <h1 style="font-weight: 900; font-size: 20px;">TRAPPEREO <span style="color:var(--purple)">CASSA</span></h1>
        <div class="total-session">TOT: <span id="valTot">0</span>€</div>
    </div>

    <section>
        <h2>🍸 MENU BAR</h2>
        <div class="grid-bar">
            <button class="btn-item" onclick="vendi('DRINK', 10)">DRINK <span>10€</span></button>
            <button class="btn-item" onclick="vendi('PREMIUM', 12)">PREMIUM <span>12€</span></button>
            <button class="btn-item" onclick="vendi('BIRRA', 6)">BIRRA <span>6€</span></button>
            <button class="btn-item" onclick="vendi('ANALCOLICO', 6)">ANALCOLICO <span>6€</span></button>
            <button class="btn-item" onclick="vendi('REDBULL', 8)">RED BULL <span>8€</span></button>
            <button class="btn-item" onclick="vendi('SHOT', 3)">SHOT <span>3€</span></button>
            <button class="btn-item" onclick="vendi('ACQUA', 3)">ACQUA <span>3€</span></button>
        </div>
    </section>

    <section>
        <h2>🧥 GUARDAROBA</h2>
        <div class="guardaroba-section">
            <input type="number" id="numGiacca" class="input-num" placeholder="N° GRUCCIA">
            <button class="btn-giacca" onclick="vendiGuardaroba()">INCASSA GIACCA (5€)</button>
        </div>
    </section>

    <div id="status">VENDITA REGISTRATA!</div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyATKCIfFo6uPwEUTZh00QIVvAJrq1L0Pw8",
            authDomain: "trappereo-7a89a.firebaseapp.com",
            projectId: "trappereo-7a89a",
            storageBucket: "trappereo-7a89a.firebasestorage.app",
            messagingSenderId: "579456256023",
            appId: "1:579456256023:web:56c2f97bbbe82c371b7452"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let incassoSessione = 0;

        // Funzione per vendere al Bar
        function vendi(prodotto, prezzo) {
            registraVendita({
                tipo: "BAR",
                item: prodotto,
                prezzo: prezzo,
                orario: new Date()
            }, prezzo);
        }

        // Funzione per il Guardaroba
        function vendiGuardaroba() {
            const numero = document.getElementById("numGiacca").value;
            if(!numero) { alert("Inserisci il numero gruccia!"); return; }
            
            registraVendita({
                tipo: "GUARDAROBA",
                gruccia: numero,
                prezzo: 5,
                orario: new Date()
            }, 5);
            document.getElementById("numGiacca").value = "";
        }

        function registraVendita(dati, prezzo) {
            const user = auth.currentUser;
            if(!user) { alert("Devi essere loggato!"); return; }

            dati.staffEmail = user.email;

            db.collection("vendite").add(dati).then(() => {
                incassoSessione += prezzo;
                document.getElementById("valTot").innerText = incassoSessione;
                
                // Feedback visivo
                const s = document.getElementById("status");
                s.style.display = "block";
                setTimeout(() => { s.style.display = "none"; }, 1000);
            });
        }

        // Protezione: se non sei loggato ti rimanda alla home
        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
